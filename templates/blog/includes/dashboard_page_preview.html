<script>
(function() {
    const initialText = new Map();
    const initialSrc = new Map();

    document.querySelectorAll('[data-preview]').forEach((el) => {
        initialText.set(el, el.textContent);
    });
    document.querySelectorAll('[data-preview-src]').forEach((el) => {
        initialSrc.set(el, el.getAttribute('src') || '');
    });
    document.querySelectorAll('[data-preview-gallery]').forEach((el) => {
        initialSrc.set(el, el.getAttribute('src') || '');
    });

    const isEnglish = () => {
        const lang = (document.documentElement.lang || '').toLowerCase();
        return lang.startsWith('en');
    };

    const applyText = (key, value) => {
        document.querySelectorAll(`[data-preview="${key}"]`).forEach((el) => {
            const fallback = initialText.get(el) ?? '';
            el.textContent = value ? value : fallback;
        });
    };

    const applySrc = (key, value) => {
        document.querySelectorAll(`[data-preview-src="${key}"]`).forEach((el) => {
            const fallback = initialSrc.get(el) ?? '';
            const url = value ? value : fallback;
            if (url) el.setAttribute('src', url);
        });
        document.querySelectorAll(`[data-preview-iframe="${key}"]`).forEach((el) => {
            const fallback = el.getAttribute('src') || '';
            const url = value ? value : fallback;
            if (url) el.setAttribute('src', url);
        });
    };

    const escapeHtml = (str) => {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    };

    const updateAlpineGallery = (urls) => {
        document.querySelectorAll('[data-page-gallery]').forEach((section) => {
            if (!window.Alpine || typeof window.Alpine.$data !== 'function') return;
            try {
                const data = window.Alpine.$data(section);
                if (data && Array.isArray(data.imgs)) {
                    data.imgs = urls.slice();
                }
            } catch (e) { /* Alpine pas encore prêt */ }
        });
    };

    const applyGallery = (urls) => {
        const list = Array.isArray(urls) ? urls.filter(Boolean) : [];
        const grid = document.querySelector('[data-gallery-preview-grid]');
        const emptyMsg = document.querySelector('[data-gallery-empty-msg]');

        if (emptyMsg) {
            emptyMsg.classList.toggle('hidden', list.length > 0);
        }

        if (grid) {
            if (list.length === 0) {
                grid.innerHTML = '';
                grid.classList.add('hidden');
            } else {
                grid.classList.remove('hidden');
                grid.innerHTML = list.map((url, idx) => (
                    '<div class="rounded-2xl overflow-hidden shadow-lg bg-gray-100 dark:bg-[#1E1E1E]">' +
                    '<img src="' + escapeHtml(url) + '" alt="" class="w-full h-48 md:h-56 object-cover" data-preview-gallery="' + idx + '">' +
                    '</div>'
                )).join('');
            }
        } else {
            document.querySelectorAll('[data-preview-gallery]').forEach((el) => {
                const idx = parseInt(el.getAttribute('data-preview-gallery'), 10);
                if (!Number.isFinite(idx) || !list[idx]) return;
                el.setAttribute('src', list[idx]);
            });
        }

        updateAlpineGallery(list);
    };

    const applyPayload = (payload) => {
        const en = isEnglish();
        const seen = new Set();
        Object.keys(payload).forEach((key) => {
            if (key.endsWith('_en') || key.endsWith('_url') || key === 'gallery_image_urls') return;
            if (seen.has(key)) return;
            seen.add(key);
            const value = en ? (payload[key + '_en'] || payload[key]) : payload[key];
            if (value !== undefined && value !== null && value !== '') {
                applyText(key, String(value));
            }
        });
        Object.keys(payload).forEach((key) => {
            if (!key.endsWith('_url')) return;
            applySrc(key, payload[key]);
        });
        if (payload.profile_image_url) applySrc('profile_image_url', payload.profile_image_url);
        if (payload.video_embed_url) applySrc('video_embed_url', payload.video_embed_url);
        if (payload.gallery_image_urls) applyGallery(payload.gallery_image_urls);
        else applyGallery([]);
    };

    window.addEventListener('message', (event) => {
        if (!event || !event.data || event.data.type !== 'page-preview') return;
        applyPayload(event.data.payload || {});
    });

    /* Demande initiale au parent (iframe chargée) */
    if (window.parent !== window) {
        window.parent.postMessage({ type: 'page-preview-ready' }, '*');
    }
})();
</script>

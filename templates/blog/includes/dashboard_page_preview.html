<script>
(function() {
    const initialText = new Map();
    const initialSrc = new Map();

    document.querySelectorAll('[data-preview]').forEach((el) => {
        initialText.set(el, el.textContent);
    });
    document.querySelectorAll('[data-preview-src]').forEach((el) => {
        initialSrc.set(el, el.getAttribute('src') || '');
    });
    document.querySelectorAll('[data-preview-gallery]').forEach((el) => {
        initialSrc.set(el, el.getAttribute('src') || '');
    });

    const isEnglish = () => {
        const lang = (document.documentElement.lang || '').toLowerCase();
        return lang.startsWith('en');
    };

    const applyText = (key, value) => {
        document.querySelectorAll(`[data-preview="${key}"]`).forEach((el) => {
            const fallback = initialText.get(el) ?? '';
            el.textContent = value ? value : fallback;
        });
    };

    const applySrc = (key, value) => {
        document.querySelectorAll(`[data-preview-src="${key}"]`).forEach((el) => {
            const fallback = initialSrc.get(el) ?? '';
            const url = value ? value : fallback;
            if (url) el.setAttribute('src', url);
        });
        document.querySelectorAll(`[data-preview-iframe="${key}"]`).forEach((el) => {
            const fallback = el.getAttribute('src') || '';
            const url = value ? value : fallback;
            if (url) el.setAttribute('src', url);
        });
    };

    const escapeHtml = (str) => {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    };

    const updateAlpineGallery = (urls) => {
        document.querySelectorAll('[data-page-gallery]').forEach((section) => {
            if (!window.Alpine || typeof window.Alpine.$data !== 'function') return;
            try {
                const data = window.Alpine.$data(section);
                if (data && Array.isArray(data.imgs)) {
                    data.imgs = urls.slice();
                }
            } catch (e) { /* Alpine pas encore prêt */ }
        });
    };

    const applyGallery = (urls) => {
        const list = Array.isArray(urls) ? urls.filter(Boolean) : [];
        const grid = document.querySelector('[data-gallery-preview-grid]');
        const emptyMsg = document.querySelector('[data-gallery-empty-msg]');

        if (emptyMsg) {
            emptyMsg.classList.toggle('hidden', list.length > 0);
        }

        if (grid) {
            if (list.length === 0) {
                grid.innerHTML = '';
                grid.classList.add('hidden');
            } else {
                grid.classList.remove('hidden');
                grid.innerHTML = list.map((url, idx) => (
                    '<div class="rounded-2xl overflow-hidden shadow-lg bg-gray-100 dark:bg-[#1E1E1E]">' +
                    '<img src="' + escapeHtml(url) + '" alt="" class="w-full h-48 md:h-56 object-cover" data-preview-gallery="' + idx + '">' +
                    '</div>'
                )).join('');
            }
        } else {
            document.querySelectorAll('[data-preview-gallery]').forEach((el) => {
                const idx = parseInt(el.getAttribute('data-preview-gallery'), 10);
                if (!Number.isFinite(idx) || !list[idx]) return;
                el.setAttribute('src', list[idx]);
            });
        }

        updateAlpineGallery(list);
    };

    const socialColorClass = (platform) => {
        const map = {
            facebook: 'bg-[#1877F2] hover:bg-[#166FE5]',
            twitter: 'bg-black hover:bg-gray-900',
            instagram: 'bg-gradient-to-br from-[#833AB4] via-[#E1306C] to-[#F77737] hover:opacity-90',
            linkedin: 'bg-[#0A66C2] hover:bg-[#004182]',
            youtube: 'bg-[#FF0000] hover:bg-[#CC0000]',
            email: 'bg-emerald-600 hover:bg-emerald-700',
            website: 'bg-slate-600 hover:bg-slate-700',
        };
        return map[platform] || 'bg-gray-600 hover:bg-gray-700';
    };

    const socialIconSvg = (platform) => {
        const icons = {
            facebook: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',
            twitter: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
            instagram: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>',
            linkedin: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
            youtube: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>',
            email: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>',
        };
        return icons[platform] || '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101"/></svg>';
    };

    const applySocialLinks = (links) => {
        const social = (links || []).filter((l) => l.category === 'social');
        const htmlFor = (sizeClass) => social.map((link) => {
            const target = link.open_in_new_tab ? ' target="_blank" rel="noopener noreferrer"' : '';
            const title = escapeHtml(link.label || link.platform || '');
            const cls = socialColorClass(link.platform);
            return '<a href="' + escapeHtml(link.url) + '"' + target + ' title="' + title + '" class="' + sizeClass + ' flex items-center justify-center transform hover:scale-110 transition-all text-white shadow-md ' + cls + '">' + socialIconSvg(link.platform) + '</a>';
        }).join('');

        document.querySelectorAll('[data-preview-social-grid]').forEach((grid) => {
            const sizeClass = grid.dataset.socialPreview === 'large'
                ? 'w-12 h-12 rounded-xl shadow-lg'
                : 'w-10 h-10 rounded-full';
            grid.innerHTML = social.length ? htmlFor(sizeClass) : '';
        });
    };

    const textLinkItemHtml = (link, linkClass) => {
        const target = link.open_in_new_tab ? ' target="_blank" rel="noopener noreferrer"' : '';
        const label = escapeHtml(link.label || link.platform || '');
        const arrow = '<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
        return '<li><a href="' + escapeHtml(link.url || '#') + '"' + target + ' class="' + linkClass + ' flex items-center gap-2">' + arrow + label + '</a></li>';
    };

    const applyTextLinkList = (selector, links, category, linkClass) => {
        const ul = document.querySelector(selector);
        if (!ul) return;
        const items = (links || []).filter((l) => l.category === category);
        ul.innerHTML = items.map((link) => textLinkItemHtml(link, linkClass)).join('');
    };

    const applyHtml = (key, html) => {
        document.querySelectorAll(`[data-preview-html="${key}"]`).forEach((el) => {
            el.innerHTML = html || el.innerHTML;
        });
    };

    const heroWaveSvg = '<div class="absolute bottom-0 left-0 right-0"><svg viewBox="0 0 1440 120" fill="none" class="w-full h-auto"><path d="M0 0L60 10C120 20 240 40 360 46.7C480 53 600 47 720 43.3C840 40 960 40 1080 46.7C1200 53 1320 67 1380 73.3L1440 80V120H1380C1320 120 1200 120 1080 120C960 120 840 120 720 120C600 120 480 120 360 120C240 120 120 120 60 120H0V0Z" class="fill-white dark:fill-[#121212]"/></svg></div>';

    const pickLocale = (fr, en) => {
        const enMode = isEnglish();
        return enMode ? (en || fr || '') : (fr || en || '');
    };

    const renderPreviewBlock = (block, idx) => {
        const t = block.block_type || 'richtext';
        const title = escapeHtml(pickLocale(block.title, block.title_en));
        const subtitle = escapeHtml(pickLocale(block.subtitle, block.subtitle_en));
        const badge = escapeHtml(pickLocale(block.badge, block.badge_en));
        const content = pickLocale(block.content, block.content_en);
        const btn = escapeHtml(pickLocale(block.button_text, block.button_text_en));
        const btnUrl = escapeHtml(block.button_url || '#');
        const img = block.image_url ? `<img src="${escapeHtml(block.image_url)}" class="absolute inset-0 w-full h-full object-cover opacity-30" alt="">` : '';
        const imgBlock = block.image_url ? `<img src="${escapeHtml(block.image_url)}" class="rounded-2xl shadow-xl mx-auto max-w-full" alt="">` : '';

        if (t === 'hero') {
            return `<section class="relative bg-gradient-to-br from-emerald-600 to-emerald-700 dark:from-emerald-950 dark:to-emerald-950 text-white overflow-hidden">${img}<div class="container mx-auto px-4 py-32 md:py-40 relative z-10 text-center max-w-4xl">${badge ? `<span class="inline-block px-4 py-1.5 rounded-full bg-white/10 border border-white/20 text-sm font-bold mb-4">${badge}</span>` : ''}${title ? `<h1 class="text-4xl md:text-6xl font-extrabold mb-4">${title}</h1>` : ''}${subtitle ? `<p class="text-xl text-white/90">${subtitle}</p>` : ''}</div>${heroWaveSvg}</section>`;
        }
        if (t === 'richtext') {
            return `<section class="py-10 bg-white dark:bg-[#121212]"><div class="container mx-auto px-4 max-w-4xl"><div class="prose prose-lg dark:prose-invert max-w-none">${content}</div></div></section>`;
        }
        if (t === 'image') {
            return `<section class="py-10 bg-white dark:bg-[#121212]"><div class="container mx-auto px-4 max-w-4xl text-center">${imgBlock}${title ? `<p class="mt-4 text-gray-600 dark:text-gray-400">${title}</p>` : ''}</div></section>`;
        }
        if (t === 'image_text') {
            return `<section class="py-10 bg-gray-50 dark:bg-[#1a1a1a]"><div class="container mx-auto px-4 max-w-6xl grid md:grid-cols-2 gap-10 items-center">${imgBlock}<div>${title ? `<h2 class="text-2xl font-extrabold mb-4 text-gray-900 dark:text-white">${title}</h2>` : ''}<div class="prose dark:prose-invert">${content}</div></div></div></section>`;
        }
        if (t === 'video') {
            const vurl = block.video_url || '';
            return `<section class="py-10 bg-white dark:bg-[#121212]"><div class="container mx-auto px-4 max-w-4xl text-center">${title ? `<h2 class="text-2xl font-extrabold mb-2">${title}</h2>` : ''}${subtitle ? `<p class="text-gray-600 dark:text-gray-400 mb-6">${subtitle}</p>` : ''}${vurl ? `<div class="aspect-video rounded-2xl overflow-hidden shadow-xl"><iframe src="${escapeHtml(vurl)}" class="w-full h-full" allowfullscreen></iframe></div>` : ''}</div></section>`;
        }
        if (t === 'cta') {
            const outline = block.layout === 'outline';
            return `<section class="py-12 bg-white dark:bg-[#121212]"><div class="container mx-auto px-4 max-w-3xl"><div class="rounded-3xl p-10 text-center ${outline ? 'border-2 border-emerald-500' : 'bg-gradient-to-br from-emerald-600 to-emerald-700 text-white shadow-xl'}">${title ? `<h2 class="text-2xl font-extrabold mb-3">${title}</h2>` : ''}${subtitle ? `<p class="mb-6 opacity-90">${subtitle}</p>` : ''}${btn ? `<a href="${btnUrl}" class="inline-flex px-8 py-3 rounded-full font-bold ${outline ? 'border-2 border-emerald-500 text-emerald-600' : 'bg-white text-emerald-700'}">${btn}</a>` : ''}</div></div></section>`;
        }
        if (t === 'faq') {
            let items = [];
            try { items = block.faq_json ? JSON.parse(block.faq_json) : (block.faq_items || []); } catch (e) { items = []; }
            const enMode = isEnglish();
            const faqHtml = items.map((it) => {
                const q = escapeHtml(enMode ? (it.q_en || it.q || '') : (it.q || it.q_en || ''));
                const a = escapeHtml(enMode ? (it.a_en || it.a || '') : (it.a || it.a_en || ''));
                return `<details class="rounded-2xl bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 mb-3 p-4"><summary class="font-semibold cursor-pointer">${q}</summary><div class="mt-2 text-gray-600 dark:text-gray-300">${a}</div></details>`;
            }).join('');
            return `<section class="py-10 bg-gray-50 dark:bg-[#1a1a1a]"><div class="container mx-auto px-4 max-w-3xl">${title ? `<h2 class="text-2xl font-extrabold text-center mb-8 text-gray-900 dark:text-white">${title}</h2>` : ''}${faqHtml}</div></section>`;
        }
        if (t === 'spacer') {
            const h = block.layout === 'lg' ? 'h-28' : (block.layout === 'md' ? 'h-16' : 'h-8');
            return `<div class="${h}" aria-hidden="true"></div>`;
        }
        if (t === 'gallery') {
            const urls = block.gallery_urls || [];
            const grid = urls.map((u) => `<figure class="rounded-2xl overflow-hidden shadow-lg"><img src="${escapeHtml(u)}" class="w-full h-48 object-cover" alt=""></figure>`).join('');
            return `<section class="py-10 bg-white dark:bg-[#121212]"><div class="container mx-auto px-4 max-w-6xl">${title ? `<h2 class="text-2xl font-extrabold text-center mb-8">${title}</h2>` : ''}<div class="grid grid-cols-2 md:grid-cols-3 gap-4">${grid || '<p class="col-span-full text-center text-gray-500">Galerie vide</p>'}</div></div></section>`;
        }
        return '';
    };

    const applyCustomPagePreview = (payload) => {
        const root = document.querySelector('[data-custom-page-root]');
        if (!root) return;
        const blocks = payload.blocks || [];
        if (blocks.length === 0) {
            const pageTitle = escapeHtml(pickLocale(payload.page_title, payload.page_title_en) || 'Nouvelle page');
            root.innerHTML = `<section class="relative bg-gradient-to-br from-emerald-600 to-emerald-700 text-white py-24"><div class="container mx-auto px-4 text-center"><h1 class="text-4xl font-extrabold">${pageTitle}</h1></div>${heroWaveSvg}</section><section class="py-12 bg-white dark:bg-[#121212]"><div class="container mx-auto px-4 max-w-4xl text-center text-gray-500">Ajoutez des blocs pour composer la page.</div></section>`;
            return;
        }
        root.innerHTML = blocks.map((block, idx) => renderPreviewBlock(block, idx)).join('');
    };

    const applyPayload = (payload) => {
        const en = isEnglish();
        const seen = new Set();
        Object.keys(payload).forEach((key) => {
            if (key.endsWith('_en') || key.endsWith('_url') || key === 'gallery_image_urls' || key === 'site_links') return;
            if (seen.has(key)) return;
            seen.add(key);
            const value = en ? (payload[key + '_en'] || payload[key]) : payload[key];
            if (value !== undefined && value !== null && value !== '') {
                applyText(key, String(value));
            }
        });
        Object.keys(payload).forEach((key) => {
            if (!key.endsWith('_url')) return;
            applySrc(key, payload[key]);
        });
        if (payload.profile_image_url) applySrc('profile_image_url', payload.profile_image_url);
        if (payload.video_embed_url) applySrc('video_embed_url', payload.video_embed_url);
        if (payload.gallery_image_urls) applyGallery(payload.gallery_image_urls);
        else applyGallery([]);
        if (payload.site_links) {
            applySocialLinks(payload.site_links);
            applyTextLinkList(
                '[data-preview-nav-links]',
                payload.site_links,
                'nav',
                'text-gray-600 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors'
            );
            applyTextLinkList(
                '[data-preview-barika-links]',
                payload.site_links,
                'footer',
                'text-gray-600 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors'
            );
        }
    };

    window.addEventListener('message', (event) => {
        if (!event || !event.data) return;
        if (event.data.type === 'custom-page-preview') {
            applyCustomPagePreview(event.data.payload || {});
            return;
        }
        if (event.data.type !== 'page-preview') return;
        applyPayload(event.data.payload || {});
    });

    /* Demande initiale au parent (iframe chargée) */
    if (window.parent !== window) {
        window.parent.postMessage({ type: 'page-preview-ready' }, '*');
    }
})();
</script>

<section class="relative bg-gradient-to-br from-emerald-600 via-emerald-600 to-emerald-700 dark:from-emerald-950 dark:to-emerald-950 text-white overflow-hidden py-20 md:py-28" data-preview-block="{{ block.pk }}" data-block-type="hero">
    {% if block.image %}
    <img src="{{ block.image.url }}" alt="" class="absolute inset-0 w-full h-full object-cover opacity-30" data-preview-src="block-{{ block.pk }}-image">
    {% endif %}
    <div class="container mx-auto px-4 relative z-10 text-center max-w-4xl">
        {% if badge %}
        <span class="inline-block px-4 py-1.5 rounded-full bg-white/20 text-sm font-bold mb-4" data-preview="block-{{ block.pk }}-badge">{{ badge }}</span>
        {% endif %}
        {% if title %}
        <h2 class="text-3xl md:text-5xl font-extrabold mb-4" data-preview="block-{{ block.pk }}-title">{{ title }}</h2>
        {% endif %}
        {% if subtitle %}
        <p class="text-lg md:text-xl text-white/90" data-preview="block-{{ block.pk }}-subtitle">{{ subtitle }}</p>
        {% endif %}
    </div>
</section>

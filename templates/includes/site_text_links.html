{% comment %}
Liste de liens texte (footer, utiles, etc.).
Variable : links (queryset SiteLink)
{% endcomment %}
{% for link in links %}
<li>
    <a href="{{ link.url }}" {% if link.open_in_new_tab %}target="_blank" rel="noopener noreferrer"{% endif %}
       class="text-gray-600 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
        {{ link.label|default:link.get_platform_display }}
    </a>
</li>
{% endfor %}

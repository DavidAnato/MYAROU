<div class="flex flex-col h-full w-full min-h-0 bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl shadow-xl overflow-hidden">
    <div class="p-5 border-b border-gray-200 dark:border-gray-700 shrink-0">
        <div class="flex items-center justify-between gap-3">
            <h3 class="text-xl font-bold text-gray-800 dark:text-white flex items-center gap-2">
                <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                Aperçu en temps réel
            </h3>
            <a href="{{ preview_url }}" target="_blank" rel="noopener" class="inline-flex items-center gap-1.5 text-emerald-600 dark:text-emerald-400 text-sm font-bold hover:underline whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                Ouvrir
            </a>
        </div>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-2 hidden xl:block">Glissez la barre entre les panneaux pour agrandir l’aperçu · double-clic pour réinitialiser</p>
        <div class="mt-4 flex flex-wrap gap-2">
            <button type="button" data-device="desktop" class="device-btn inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold bg-emerald-600 text-white">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                Desktop
            </button>
            <button type="button" data-device="tablet" class="device-btn inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-white">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                Tablet
            </button>
            <button type="button" data-device="mobile" class="device-btn inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-white">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                Mobile
            </button>
        </div>
    </div>
    <div class="flex-1 bg-gray-100 dark:bg-gray-900 p-4 overflow-hidden min-h-0">
        <div class="h-full w-full flex items-center justify-center min-h-0">
            <div id="{{ device_frame_id|default:'pageDeviceFrame' }}" class="h-full w-full bg-white dark:bg-black rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden">
                <div class="h-10 bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4">
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-red-400"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                        <div class="w-3 h-3 rounded-full bg-green-400"></div>
                    </div>
                    <div class="text-xs font-semibold text-gray-500 dark:text-gray-300 truncate max-w-[70%]">{{ preview_url }}</div>
                    <div class="w-6"></div>
                </div>
                <iframe id="{{ iframe_id|default:'pagePreviewIframe' }}" src="{{ preview_url }}" class="w-full h-[calc(100%-2.5rem)] bg-white" loading="lazy" title="Aperçu"></iframe>
            </div>
        </div>
    </div>
</div>

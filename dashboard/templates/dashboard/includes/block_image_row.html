<div class="builder-image-row grid grid-cols-1 md:grid-cols-3 gap-4 p-4"
     data-block-image-form
     data-block-id="{{ imgf.instance.block_id|default:'' }}"
     data-image-pk="{{ imgf.instance.pk|default:'' }}">
    {{ imgf.id }}
    {{ imgf.block }}
    <div class="md:col-span-2 builder-field" data-media-container>
        <label class="builder-field-label">Photo</label>
        {{ imgf.image }}
        {% if imgf.instance.pk and imgf.instance.image %}
        <img src="{{ imgf.instance.image.url }}" alt="" class="mt-2 max-w-full rounded-lg shadow-md" data-existing-image>
        {% endif %}
    </div>
    <div class="space-y-3">
        <div class="builder-field"><label>Légende FR</label>{{ imgf.caption }}</div>
        <div class="builder-field"><label>Légende EN</label>{{ imgf.caption_en }}</div>
        <div class="hidden">{{ imgf.order }}</div>
        <button type="button" data-delete-block-image
                {% if imgf.instance.pk %}data-image-pk="{{ imgf.instance.pk }}"{% else %}data-delete-new{% endif %}
                class="inline-flex items-center gap-1 text-xs text-red-600 dark:text-red-400 font-bold hover:underline">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            Supprimer
        </button>
    </div>
    <div class="hidden">{{ imgf.DELETE }}</div>
</div>

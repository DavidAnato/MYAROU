<div class="rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900/30 overflow-hidden builder-image-row"
     data-block-image-form
     data-form-prefix="{{ img_form_prefix|default:'' }}"
     data-block-id="{{ imgf.instance.block_id|default:'' }}"
     data-block-card-index=""
     data-image-pk="{{ imgf.instance.pk|default:'' }}">
    <div class="flex items-center justify-between gap-3 px-4 py-3 bg-gray-50/80 dark:bg-gray-900/50 border-b border-gray-200 dark:border-gray-700">
        <div class="text-sm font-extrabold text-gray-900 dark:text-white flex items-center gap-2 min-w-0">
            <span class="builder-image-row-handle text-gray-400 shrink-0 cursor-grab active:cursor-grabbing" title="Glisser pour réordonner">⠿</span>
            <svg class="w-4 h-4 text-emerald-600 dark:text-emerald-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span>Image <span class="text-emerald-600 dark:text-emerald-400" data-block-gallery-index>1</span></span>
        </div>
        <button type="button" data-delete-block-image
                {% if imgf.instance.pk %}data-image-pk="{{ imgf.instance.pk }}"{% else %}data-delete-new{% endif %}
                class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/50 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            Supprimer
        </button>
    </div>
    <div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2" data-media-container>
            <div class="media-dropzone relative overflow-hidden rounded-2xl border-2 border-dashed border-gray-300 dark:border-gray-600 p-4 bg-white dark:bg-gray-800 transition-colors">
                <div class="flex items-center justify-between gap-3 mb-2">
                    <div class="flex items-center gap-2 text-xs font-semibold text-gray-500 dark:text-gray-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                        <span data-drop-hint>Glisser-déposer ou cliquer</span>
                    </div>
                    <button type="button" class="inline-flex items-center gap-1 px-3 py-1 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-white text-xs font-bold hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors opacity-50 cursor-not-allowed" data-clear-file disabled>
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        Retirer
                    </button>
                </div>
                <div class="text-xs text-gray-600 dark:text-gray-300 mb-2 truncate" data-filename></div>
                {{ imgf.image }}
            </div>
            <div class="mt-3">
                <img alt="" class="w-full max-w-sm rounded-2xl shadow hidden" data-preview-image>
                {% if imgf.instance.pk and imgf.instance.image %}
                <img src="{{ imgf.instance.image.url }}" alt="" class="w-full max-w-sm rounded-2xl shadow" data-existing-image>
                {% endif %}
            </div>
        </div>
        <div class="rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50/80 dark:bg-gray-900/50 p-4 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2">Légende FR</label>
                {{ imgf.caption }}
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2">Légende EN</label>
                {{ imgf.caption_en }}
            </div>
            <div class="hidden">{{ imgf.order }}</div>
        </div>
    </div>
    {{ imgf.id }}
    {{ imgf.block }}
    <div class="hidden">{{ imgf.DELETE }}</div>
</div>

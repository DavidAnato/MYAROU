<div class="flex flex-wrap items-center justify-between gap-3">
    <div class="text-xs font-semibold text-gray-500 dark:text-gray-300 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Glisser-déposer plusieurs images <span class="text-gray-400 dark:text-gray-500" data-block-gallery-count>(0/50)</span>
    </div>
    <div class="flex flex-wrap gap-2">
        <input type="file" accept="image/*" multiple class="hidden" data-block-gallery-multi-input>
        <button type="button" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-600 text-white text-sm font-bold hover:bg-emerald-700" data-block-gallery-multi-button>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Ajouter des images
        </button>
        <button type="button" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-white text-sm font-bold hover:bg-gray-200 dark:hover:bg-gray-600" data-block-gallery-add-one>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Une image
        </button>
    </div>
</div>

<div class="rounded-2xl border-2 border-dashed border-gray-300 dark:border-gray-600 p-5 bg-white dark:bg-gray-800 transition-colors" data-block-gallery-dropzone>
    <div class="text-sm font-extrabold text-gray-900 dark:text-white flex items-center gap-2">
        <svg class="w-5 h-5 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
        Zone de dépôt
    </div>
    <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">Les fichiers seront ajoutés à la liste ci-dessous</div>
</div>
